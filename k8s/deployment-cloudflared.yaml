apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: ncfn
  labels:
    app: cloudflared
    project: ncfn-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          imagePullPolicy: IfNotPresent
          args:
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(CF_TUNNEL_TOKEN)
          env:
            - name: CF_TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ncfn-cf-token
                  key: token

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

      restartPolicy: Always
