# ═══════════════════════════════════════════════════════════════
# Portal NCFN — NetworkPolicy (zero-trust intra-cluster)
# ═══════════════════════════════════════════════════════════════

# ── Portal: aceita tráfego apenas do Caddy ──────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: portal-netpol
  namespace: ncfn
spec:
  podSelector:
    matchLabels:
      app: portal
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Tráfego de entrada: apenas do Caddy
    - from:
        - podSelector:
            matchLabels:
              app: caddy
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Saída: PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Saída: DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Saída: HTTPS (Cloudflare API, TSA, Gemini, Anthropic, etc.)
    - ports:
        - protocol: TCP
          port: 443
    # Saída: Ollama no host (via host.docker.internal:11434)
    - ports:
        - protocol: TCP
          port: 11434
---
# ── PostgreSQL: aceita tráfego apenas do Portal ─────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-netpol
  namespace: ncfn
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: portal
      ports:
        - protocol: TCP
          port: 5432
  egress:
    # Sem saída necessária para o PostgreSQL
    - ports:
        - protocol: UDP
          port: 53
---
# ── Caddy: aceita do cloudflared, redireciona para portal ───────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: caddy-netpol
  namespace: ncfn
spec:
  podSelector:
    matchLabels:
      app: caddy
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Cloudflared → Caddy (porta 80 local)
    - from:
        - podSelector:
            matchLabels:
              app: cloudflared
      ports:
        - protocol: TCP
          port: 80
  egress:
    # Caddy → Portal
    - to:
        - podSelector:
            matchLabels:
              app: portal
      ports:
        - protocol: TCP
          port: 3000
    # DNS + HTTPS para ACME (se necessário)
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 443
---
# ── Cloudflared: egress para Cloudflare Edge ────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudflared-netpol
  namespace: ncfn
spec:
  podSelector:
    matchLabels:
      app: cloudflared
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # Cloudflare Edge (HTTPS)
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 7844  # QUIC
        - protocol: UDP
          port: 7844
    # Caddy
    - to:
        - podSelector:
            matchLabels:
              app: caddy
      ports:
        - protocol: TCP
          port: 80
    # DNS
    - ports:
        - protocol: UDP
          port: 53
