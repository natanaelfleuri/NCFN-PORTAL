# ═══════════════════════════════════════════════════════════════
# Portal NCFN — PersistentVolumes + PersistentVolumeClaims
# Todos hostPath (single-node k3s)
# ═══════════════════════════════════════════════════════════════

# ── 1. SQLite Database ──────────────────────────────────────────
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ncfn-db-pv
  labels:
    project: ncfn-portal
spec:
  capacity:
    storage: 2Gi
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
  hostPath:
    path: /root/docker/portal_ncfn/data/db
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ncfn-db-pvc
  namespace: ncfn
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
  volumeName: ncfn-db-pv
---
