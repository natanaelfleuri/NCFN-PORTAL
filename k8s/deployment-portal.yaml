apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: ncfn
  labels:
    app: portal
    project: ncfn-portal
spec:
  replicas: 2                     # HPA gerencia min=2, max=4
  selector:
    matchLabels:
      app: portal
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0           # zero downtime — só desce réplica depois de nova subir
      maxSurge: 1
  template:
    metadata:
      labels:
        app: portal
      annotations:
        # Força restart quando secret mudar (hash injetado pelo migration.sh)
        secret-hash: "change-me-on-deploy"
    spec:
      # Permite acesso ao Docker socket (OSINT via docker run)
      securityContext:
        supplementalGroups: [989]  # docker GID na VPS

      # Garante que as 2 réplicas ficam em nós diferentes (se houver multi-node)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: portal
                topologyKey: kubernetes.io/hostname

      # Aguarda PostgreSQL antes de iniciar
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-svc 5432; do
                echo "Aguardando PostgreSQL..."
                sleep 3
              done
              echo "PostgreSQL disponível."

      volumes:
        - name: ncfn-cofre
          persistentVolumeClaim:
            claimName: ncfn-cofre-pvc
        - name: ncfn-arquivos
          persistentVolumeClaim:
            claimName: ncfn-arquivos-pvc
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket

      containers:
        - name: portal
          image: ncfn/portal:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              protocol: TCP

          envFrom:
            - secretRef:
                name: ncfn-env

          # Override DATABASE_URL para apontar ao PostgreSQL interno do cluster
          env:
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-svc:5432/ncfn_db?schema=public"

          volumeMounts:
            - name: ncfn-cofre
              mountPath: /COFRE_NCFN
            - name: ncfn-arquivos
              mountPath: /arquivos
            - name: docker-sock
              mountPath: /var/run/docker.sock

          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 800m
              memory: 2Gi

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24   # 2 min para o Next.js iniciar

          # Usuário portal (UID 1001) definido no Dockerfile
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

      restartPolicy: Always
