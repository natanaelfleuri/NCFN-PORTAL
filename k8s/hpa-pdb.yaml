# ═══════════════════════════════════════════════════════════════
# Portal NCFN — HPA + PodDisruptionBudget
# ═══════════════════════════════════════════════════════════════

# ── HorizontalPodAutoscaler — Portal ────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: portal-hpa
  namespace: ncfn
  labels:
    project: ncfn-portal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: portal
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
# ── PodDisruptionBudget — Portal ────────────────────────────────
# Garante que pelo menos 1 réplica fique disponível durante manutenção
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: portal-pdb
  namespace: ncfn
  labels:
    project: ncfn-portal
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: portal
---
# ── PodDisruptionBudget — PostgreSQL ────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres-pdb
  namespace: ncfn
  labels:
    project: ncfn-portal
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: postgres
