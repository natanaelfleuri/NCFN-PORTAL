          - paragraph [ref=e771]: O endereço de Protocolo de Internet (IP) consubstancia identificador técnico atribuído a dispositivo conectado a rede de dados, cuja finalidade precípua é viabilizar a comunicação entre terminais, permitindo a indicação da origem lógica de determinada atividade digital, sem, contudo, possuir aptidão para individualizar, de forma direta e inequívoca, a identidade civil do agente. Nessa senda, os registros de IP ostentam natureza eminentemente indiciária e contextual, revelando-se insuficientes, quando considerados de forma isolada, para a comprovação da autoria delitiva. Sua valoração probatória demanda, imprescindivelmente, a conjugação com outros elementos informativos idôneos, regularmente obtidos mediante autorização judicial, quando exigível, e em estrita observância às garantias constitucionais do devido processo legal, da ampla defesa e do contraditório, de modo a viabilizar a segura imputação da conduta ao respectivo responsável.
