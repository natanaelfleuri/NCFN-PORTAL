tunnel: e0423fdb-84ac-4b6c-8a73-0fa4a5765c43
credentials-file: /etc/cloudflared/credentials.json

ingress:
  - hostname: ncfn.net
    service: http://127.0.0.1:80
  - hostname: www.ncfn.net
    service: http://127.0.0.1:80
  - hostname: ncfn.ncfn.net
    service: http://127.0.0.1:3000
    originRequest:
      noTLSVerify: true
  - hostname: cloud.ncfn.net
    service: http://ncfn_nextcloud:80
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s
  # ── Mailcow SoGo Webmail (mail.ncfn.net) ─────────────────────────────────
  # Cloudflare Tunnel encaminha apenas HTTP/HTTPS.
  # SMTP (587), IMAP (993) e SMTP MTA (25) apontam direto para o IP da VPS.
  # O DNS A record de mail.ncfn.net deve ser configurado SEM proxy Cloudflare.
  - hostname: mail.ncfn.net
    service: http://localhost:8080
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s
  - service: http_status:404
