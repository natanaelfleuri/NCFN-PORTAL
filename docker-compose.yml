version: '3.8'

services:
  portal:
    image: node:18-alpine
    container_name: portal_ncfn_dev
    working_dir: /app
    user: "root"
    volumes:
      - ./app:/app
      - ./arquivos:/arquivos
      - ./COFRE_NCFN:/COFRE_NCFN
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=development
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3002}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-fleuriengenharia@gmail.com}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - CF_ACCESS_TEAM_DOMAIN=${CF_ACCESS_TEAM_DOMAIN}
      - CRYPTO_SALT=${CRYPTO_SALT}
      - JWT_SECRET=${JWT_SECRET}
      - CRON_SECRET=${CRON_SECRET}
      - MASTER_UNLOCK_KEY=${MASTER_UNLOCK_KEY}
      - PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=/usr/bin/chromium-browser
      - WEB_CHECK_URL=http://web-check:3000
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      - DEV_BYPASS=true
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "apk add --no-cache exiftool file python3 make g++ chromium nss freetype harfbuzz ca-certificates ttf-freefont 2>/dev/null || true && chmod 666 /app/prisma/dev.db 2>/dev/null || true && npm install --legacy-peer-deps && npx prisma db push --skip-generate 2>&1 && npx prisma generate && NODE_ENV=production npm run build && NODE_ENV=production npm start"
    restart: unless-stopped

  web-check:
    image: lissy93/web-check
    container_name: ncfn_web_check
    ports:
      - "3005:3000"
    environment:
      - API_ENABLE_RATE_LIMIT=false
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: caddy_ncfn
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  # ─── Cloudflare Tunnel ──────────────────────────────────────────────────────
  # Conecta o portal à edge da Cloudflare sem expor portas públicas
  # O roteamento é configurado no dashboard CF → tunnel → ncfn.net → http://portal:3000
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ncfn_cloudflared
    restart: unless-stopped
    # network_mode: host → localhost:3002 resolve para o host (onde portal expõe a porta)
    network_mode: host
    command: tunnel --no-autoupdate run --token eyJhIjoiNGQyOWY1MTBjZWZkNDZjMDdmNWMxZWM3OGUyNzI3OTIiLCJ0IjoiMTZhMTVlYmQtNDJjNS00ZDMwLTg0NGUtNTFiN2YyNjYyMzRmIiwicyI6Ik1qazRNbU0zWXpNdE1UTmhOQzAwT0RFMExXRmlNVEF0WWpZM05EWmtZV05rTlRjeCJ9

  # ─── Whisper ASR (Transcrição de Áudio) ────────────────────────────────────
  # Ativar: docker compose --profile whisper up -d
  # RAM: ~1.5GB com modelo base
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: ncfn_whisper
    profiles:
      - whisper
    ports:
      - "9000:9000"
    environment:
      - ASR_MODEL=base
    restart: unless-stopped

  # ─── ChromaDB (RAG Jurídico) ────────────────────────────────────────────────
  # Ativar: docker compose --profile rag up -d
  # RAM: ~300MB, embeddings via Ollama (nomic-embed-text)
  chromadb:
    image: chromadb/chroma:latest
    container_name: ncfn_chromadb
    profiles:
      - rag
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  # ─── OSINT Desktop (Ubuntu/XFCE via noVNC) ─────────────────────────────────
  # Substitui Kasm Workspaces: requer ~2-4GB RAM (vs 16GB do Kasm).
  # Ativar: docker compose --profile osint up -d
  # Acessar: http://localhost:3003  (senha: OSINT_DESKTOP_PASSWORD no .env)
  osint-desktop:
    image: lscr.io/linuxserver/webtop:ubuntu-xfce
    container_name: ncfn_osint
    profiles:
      - osint
    ports:
      - "3003:3000"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - PASSWD=${OSINT_DESKTOP_PASSWORD:-OsintNcfn@2026!}
    volumes:
      - osint_home:/config
      - ./scripts/osint-install.sh:/custom-cont-init.d/99-osint.sh:ro
    shm_size: "1gb"
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  osint_home:
  chroma_data:
