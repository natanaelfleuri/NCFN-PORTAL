version: '3.8'

services:

  # ─── PostgreSQL (migração futura do SQLite) ──────────────────────────────────
  # Ativar: docker compose --profile postgres up -d postgres
  # Depois trocar DATABASE_URL no .env para: postgresql://ncfn:ncfn2026@postgres:5432/ncfn_db
  postgres:
    image: postgres:16-alpine
    container_name: ncfn_postgres
    profiles:
      - postgres
    mem_limit: 512m
    mem_reservation: 128m
    cpus: "2"
    environment:
      POSTGRES_DB: ncfn_db
      POSTGRES_USER: ncfn
      POSTGRES_PASSWORD: ncfn2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ncfn -d ncfn_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis (cache, rate limiting, pub/sub SSE) ───────────────────────────────
  # Ativar: docker compose --profile cache up -d redis
  # Adicionar no .env: REDIS_URL=redis://redis:6379
  redis:
    image: redis:7-alpine
    container_name: ncfn_redis
    profiles:
      - cache
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  portal:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
    container_name: portal_ncfn_dev
    user: "root"
    mem_limit: 2g
    mem_reservation: 512m
    cpus: "4"
    volumes:
      - ./app/prisma/dev.db:/app/prisma/dev.db
      - ./arquivos:/arquivos
      - ./COFRE_NCFN:/COFRE_NCFN
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/roaaxxz/ncfn-internxt:/internxt-drive
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3002}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-fleuriengenharia@gmail.com}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - CF_ACCESS_TEAM_DOMAIN=${CF_ACCESS_TEAM_DOMAIN}
      - CRYPTO_SALT=${CRYPTO_SALT}
      - JWT_SECRET=${JWT_SECRET}
      - CRON_SECRET=${CRON_SECRET}
      - MASTER_UNLOCK_KEY=${MASTER_UNLOCK_KEY}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-ncfn-vault}
      - PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=/usr/bin/chromium-browser
      - WEB_CHECK_URL=http://web-check:3000
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      - DEV_BYPASS=true
      - DATABASE_URL=postgresql://ncfn:ncfn2026@ncfn_postgres:5432/ncfn_db
      # Redis (ativar com --profile cache):
      # - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - ncfn_mailcow
    restart: unless-stopped

  # ─── Terminal Web (ttyd) ────────────────────────────────────────────────────
  # Acesso: /terminal/ (via Caddy, protegido por CF Access)
  # Fornece terminal root da VPS + acesso ao Docker socket
  ttyd:
    image: tsl0922/ttyd:latest
    container_name: ncfn_ttyd
    command: ["ttyd", "-W", "-b", "/terminal", "-t", "fontSize=14", "nsenter", "-t", "1", "-m", "-u", "-i", "-n", "-p", "--", "bash", "--login"]
    privileged: true
    pid: host
    mem_limit: 512m
    cpus: "2"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/host:rw
      - ./:/workspace:rw
    working_dir: /workspace
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    restart: unless-stopped

  web-check:
    image: lissy93/web-check
    container_name: ncfn_web_check
    mem_limit: 512m
    cpus: "2"
    ports:
      - "3005:3000"
    environment:
      - API_ENABLE_RATE_LIMIT=false
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: caddy_ncfn
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  # ─── Cloudflare Tunnel ──────────────────────────────────────────────────────
  # Tunnel e0423fdb-84ac-4b6c-8a73-0fa4a5765c43 (ativo no Zero Trust)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ncfn_cloudflared
    restart: unless-stopped
    network_mode: host
    command: tunnel --no-autoupdate run --token eyJhIjoiNGQyOWY1MTBjZWZkNDZjMDdmNWMxZWM3OGUyNzI3OTIiLCJ0IjoiZTA0MjNmZGItODRhYy00YjZjLThhNzMtMGZhNGE1NzY1YzQzIiwicyI6Ik5UWmxZakk0TlRrdFkySTVNQzAwWmpjMExXRXlNelV0TldKallXSXhNekl5Tm1NNSJ9

  # ─── Nextcloud (cloud.ncfn.net) ─────────────────────────────────────────────
  # Ativar: docker compose --profile cloud up -d nextcloud
  # Primeiro acesso: https://cloud.ncfn.net → wizard de instalação
  # Setup banco: usar SQLite (padrão) ou ativar profile postgres
  nextcloud:
    image: nextcloud:27-apache
    container_name: ncfn_nextcloud
    profiles:
      - cloud
    mem_limit: 1g
    mem_reservation: 256m
    cpus: "2"
    volumes:
      - ./nextcloud_data:/var/www/html/data
      - ./nextcloud_config:/var/www/html/config
      - ./nextcloud_apps:/var/www/html/apps
    environment:
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD:-NCFN_Admin_2026!}
      - NEXTCLOUD_TRUSTED_DOMAINS=cloud.ncfn.net localhost 127.0.0.1
      - OVERWRITEHOST=cloud.ncfn.net
      - OVERWRITEPROTOCOL=https
      - OVERWRITECLIURL=https://cloud.ncfn.net
      - PHP_MEMORY_LIMIT=512M
      - PHP_UPLOAD_LIMIT=5G
      - APACHE_DISABLE_REWRITE_IP=1
      # Banco: SQLite por padrão. Para PostgreSQL, adicionar:
      # - POSTGRES_HOST=ncfn_postgres
      # - POSTGRES_DB=nextcloud_db
      # - POSTGRES_USER=ncfn
      # - POSTGRES_PASSWORD=ncfn2026
    restart: unless-stopped

  # ─── ProtonMail Bridge (SMTP PGP-signed) ────────────────────────────────────
  # Ativar: docker compose --profile secure-mail up -d protonmail-bridge
  # Setup inicial OBRIGATÓRIO (uma vez):
  #   docker exec -it ncfn_protonmail_bridge protonmail-bridge --cli
  #   > login → digitar email/senha ProtonMail → info → copiar SMTP user/pass
  #   Adicionar ao .env: BRIDGE_SMTP_USER, BRIDGE_SMTP_PASS, BRIDGE_FROM
  #
  # Alternativas sem ProtonMail:
  #   - Gmail: SMTP_HOST=smtp.gmail.com SMTP_PORT=587 SMTP_USER= SMTP_PASS=app-password
  #   - Resend: RESEND_API_KEY=re_... (resend.com — plano gratuito 3000/mês)
  protonmail-bridge:
    image: shenxianpeng/protonmail-bridge:latest
    container_name: ncfn_protonmail_bridge
    profiles:
      - secure-mail
    mem_limit: 256m
    cpus: "1"
    volumes:
      - ./protonmail_bridge_data:/root
    environment:
      - TZ=America/Sao_Paulo
    restart: unless-stopped

  # ─── Whisper ASR (Transcrição de Áudio) ────────────────────────────────────
  # Ativar: docker compose --profile whisper up -d
  # RAM: ~1.5GB com modelo base
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: ncfn_whisper
    profiles:
      - whisper
    ports:
      - "9000:9000"
    environment:
      - ASR_MODEL=base
    restart: unless-stopped

  # ─── ChromaDB (RAG Jurídico) ────────────────────────────────────────────────
  # Ativar: docker compose --profile rag up -d
  # RAM: ~300MB, embeddings via Ollama (nomic-embed-text)
  chromadb:
    image: chromadb/chroma:latest
    container_name: ncfn_chromadb
    profiles:
      - rag
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  # ─── OSINT Desktop (Ubuntu/XFCE via noVNC) ─────────────────────────────────
  # Substitui Kasm Workspaces: requer ~2-4GB RAM (vs 16GB do Kasm).
  # Ativar: docker compose --profile osint up -d
  # Acessar: http://localhost:3003  (senha: OSINT_DESKTOP_PASSWORD no .env)
  osint-desktop:
    image: lscr.io/linuxserver/webtop:ubuntu-xfce
    container_name: ncfn_osint
    profiles:
      - osint
    mem_limit: 4g
    mem_reservation: 1g
    cpus: "6"
    ports:
      - "3003:3000"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - PASSWD=${OSINT_DESKTOP_PASSWORD:-OsintNcfn@2026!}
      - SUBFOLDER=/osint/
    volumes:
      - osint_home:/config
      - ./scripts/osint-install.sh:/custom-cont-init.d/99-osint.sh:ro
    shm_size: "2gb"
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  osint_home:
  chroma_data:
  postgres_data:
  redis_data:
  nextcloud_data:
  nextcloud_config:
  nextcloud_apps:

# ── Redes externas ──────────────────────────────────────────────────────────
# ncfn_mailcow: rede criada pelo mailcow/install.sh — permite portal atingir
#               postfix/dovecot do Mailcow por nome de container internamente.
#               Alternativa: usar mail.ncfn.net:587 direto (resolve pelo DNS VPS).
networks:
  default:
    name: ncfn_default
  ncfn_mailcow:
    external: true
    name: ncfn_mailcow
